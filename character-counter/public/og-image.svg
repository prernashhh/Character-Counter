<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Content area -->
  <rect x="50" y="50" width="1100" height="530" fill="rgba(255,255,255,0.1)" rx="20"/>
  
  <!-- Main title -->
  <text x="600" y="220" font-size="80" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    Character Counter
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="310" font-size="40" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">
    Free Online Text Analysis Tool
  </text>
  
  <!-- Feature text -->
  <text x="600" y="410" font-size="24" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">
    Count characters, words, sentences, and paragraphs instantly
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="480" width="400" height="4" fill="rgba(255,255,255,0.6)" rx="2"/>
</svg>
